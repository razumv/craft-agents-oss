# Craft Agent Web Client — nginx reverse proxy config
#
# Prerequisites:
#   1. Headless server running on localhost:9100
#   2. Static SPA built: cd apps/web && bun run build
#   3. Let's Encrypt cert: certbot --nginx -d craft.yourdomain.com
#
# Usage:
#   cp deploy/nginx/craft-agent-web.conf /etc/nginx/sites-available/craft-agent
#   ln -s /etc/nginx/sites-available/craft-agent /etc/nginx/sites-enabled/
#   # Edit: replace craft.yourdomain.com and /path/to/craft-agents-oss
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name craft.yourdomain.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name craft.yourdomain.com;

    # TLS — managed by certbot (uncomment after running certbot)
    # ssl_certificate /etc/letsencrypt/live/craft.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/craft.yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    # Static SPA
    root /path/to/craft-agents-oss/apps/web/dist;
    index index.html;

    # SPA fallback — all non-file routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket reverse proxy
    location /ws {
        proxy_pass http://127.0.0.1:9100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # 24h — keep WS alive
        proxy_send_timeout 86400;
    }

    # OAuth callback endpoint (if using server-side OAuth redirect)
    location /oauth/ {
        proxy_pass http://127.0.0.1:9100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
